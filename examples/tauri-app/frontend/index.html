<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statiq Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; padding: 2rem; }
    h1 { color: #38bdf8; margin-bottom: 1.5rem; font-size: 1.5rem; }
    h2 { color: #94a3b8; font-size: 1rem; margin: 1.5rem 0 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }

    .card { background: #1e293b; border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 1.5rem; }
    .row { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1rem; }
    input, button { padding: 0.5rem 1rem; border-radius: 0.5rem; border: 1px solid #334155; font-size: 0.875rem; }
    input { background: #0f172a; color: #e2e8f0; flex: 1; min-width: 120px; }
    button { background: #0284c7; color: white; border: none; cursor: pointer; white-space: nowrap; }
    button:hover { background: #0369a1; }
    button.danger { background: #dc2626; }
    button.danger:hover { background: #b91c1c; }

    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; color: #64748b; font-weight: 600; padding: 0.5rem 0.75rem; border-bottom: 1px solid #334155; }
    td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #1e293b; }
    tr:hover td { background: #1e293b; }

    #status { position: fixed; bottom: 1rem; right: 1rem; background: #0369a1; color: white;
              padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem;
              transition: opacity 0.3s; opacity: 0; }
    #status.show { opacity: 1; }
    #status.error { background: #dc2626; }
  </style>
</head>
<body>
  <h1>Statiq — MSSQL Desktop Demo (Tauri + statiq)</h1>

  <!-- Ürün listesi -->
  <div class="card">
    <h2>Ürünler</h2>
    <div class="row">
      <button onclick="loadProducts()">Yenile</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Ad</th><th>Fiyat</th><th>Stok</th><th>Aktif</th><th>İşlem</th>
        </tr>
      </thead>
      <tbody id="product-list"></tbody>
    </table>
  </div>

  <!-- Yeni ürün ekle -->
  <div class="card">
    <h2>Yeni Ürün Ekle</h2>
    <div class="row">
      <input id="new-name"  placeholder="Ad"    type="text" />
      <input id="new-price" placeholder="Fiyat" type="number" step="0.01" />
      <input id="new-stock" placeholder="Stok"  type="number" />
      <label style="color:#94a3b8;font-size:.875rem">
        <input id="new-active" type="checkbox" checked /> Aktif
      </label>
      <button onclick="createProduct()">Ekle</button>
    </div>
  </div>

  <!-- Arama -->
  <div class="card">
    <h2>Ürün Ara</h2>
    <div class="row">
      <input id="search-name" placeholder="Ürün adı..." type="text" />
      <button onclick="searchProducts()">Ara</button>
    </div>
    <table>
      <thead><tr><th>ID</th><th>Ad</th><th>Fiyat</th><th>Stok</th><th>Aktif</th></tr></thead>
      <tbody id="search-results"></tbody>
    </table>
  </div>

  <!-- Sproc -->
  <div class="card">
    <h2>En Pahalı 5 Ürün (Stored Procedure)</h2>
    <div class="row">
      <button onclick="loadTopProducts()">Çalıştır</button>
    </div>
    <table>
      <thead><tr><th>ID</th><th>Ad</th><th>Fiyat</th><th>Stok</th></tr></thead>
      <tbody id="top-products"></tbody>
    </table>
  </div>

  <div id="status"></div>

  <script>
    const { invoke } = window.__TAURI__.core;

    function showStatus(msg, isError = false) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'show' + (isError ? ' error' : '');
      setTimeout(() => el.className = '', 2500);
    }

    function productRow(p, showDelete = true) {
      return `<tr>
        <td>${p.id}</td>
        <td>${p.name}</td>
        <td>${p.price.toFixed(2)} ₺</td>
        <td>${p.stock}</td>
        <td>${p.active ? '✅' : '❌'}</td>
        ${showDelete ? `<td><button class="danger" onclick="deleteProduct(${p.id})">Sil</button></td>` : '<td></td>'}
      </tr>`;
    }

    async function loadProducts() {
      try {
        const products = await invoke('get_all_products');
        document.getElementById('product-list').innerHTML =
          products.map(p => productRow(p)).join('');
        showStatus(`${products.length} ürün yüklendi`);
      } catch (e) { showStatus(String(e), true); }
    }

    async function createProduct() {
      const name   = document.getElementById('new-name').value.trim();
      const price  = parseFloat(document.getElementById('new-price').value);
      const stock  = parseInt(document.getElementById('new-stock').value);
      const active = document.getElementById('new-active').checked;
      if (!name || isNaN(price)) return showStatus('Ad ve fiyat zorunlu', true);
      try {
        const id = await invoke('create_product', { name, price, stock, active });
        showStatus(`Ürün oluşturuldu (ID: ${id})`);
        loadProducts();
      } catch (e) { showStatus(String(e), true); }
    }

    async function deleteProduct(id) {
      if (!confirm(`#${id} ürünü silinsin mi?`)) return;
      try {
        await invoke('delete_product', { id });
        showStatus(`Ürün ${id} silindi`);
        loadProducts();
      } catch (e) { showStatus(String(e), true); }
    }

    async function searchProducts() {
      const name = document.getElementById('search-name').value.trim();
      try {
        const results = await invoke('search_products', { name });
        document.getElementById('search-results').innerHTML =
          results.map(p => productRow(p, false)).join('');
        showStatus(`${results.length} sonuç bulundu`);
      } catch (e) { showStatus(String(e), true); }
    }

    async function loadTopProducts() {
      try {
        const products = await invoke('get_top_products', { topN: 5 });
        document.getElementById('top-products').innerHTML =
          products.map(p => `<tr>
            <td>${p.id}</td><td>${p.name}</td>
            <td>${p.price.toFixed(2)} ₺</td><td>${p.stock}</td>
          </tr>`).join('');
        showStatus('Stored procedure çalıştı');
      } catch (e) { showStatus(String(e), true); }
    }

    // Uygulama açılışında ürünleri yükle
    loadProducts();
  </script>
</body>
</html>
