<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">Statiq hero</title>
  <desc id="desc">Premium banner for Statiq showing compile-time SQL generation, services, and target platforms.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081018"/>
      <stop offset="52%" stop-color="#10273a"/>
      <stop offset="100%" stop-color="#15384e"/>
    </linearGradient>
    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#37e4d0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#37e4d0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-amber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f6b15c" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#f6b15c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b28" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#12293d" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="card-soft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12283a"/>
      <stop offset="100%" stop-color="#17344a"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d6f3ff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="blur-xl" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="44"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#021019" flood-opacity="0.38"/>
    </filter>
    <style>
      .kicker { font: 600 22px 'Space Grotesk', 'Segoe UI', Arial, sans-serif; fill: #c9fbf6; letter-spacing: 0.3px; }
      .title { font: 700 104px 'Space Grotesk', 'Segoe UI', Arial, sans-serif; fill: #f5fbff; letter-spacing: -3px; }
      .label { font: 600 25px 'Space Grotesk', 'Segoe UI', Arial, sans-serif; fill: #eaf7ff; }
      .muted { font: 500 22px 'Segoe UI', Arial, sans-serif; fill: #b2d1e5; }
      .chip { font: 600 20px 'Space Grotesk', 'Segoe UI', Arial, sans-serif; fill: #effaff; }
      .chip-soft { font: 600 18px 'Space Grotesk', 'Segoe UI', Arial, sans-serif; fill: #dff8ff; }
      .card-title { font: 700 28px 'Space Grotesk', 'Segoe UI', Arial, sans-serif; fill: #f4fbff; }
      .card-copy { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #b9d9ec; }
      .code { font: 600 24px 'Cascadia Code', 'Consolas', monospace; fill: #f4fbff; }
      .mini { font: 600 16px 'Space Grotesk', 'Segoe UI', Arial, sans-serif; fill: #0b1620; }
      .mini-light { font: 600 16px 'Space Grotesk', 'Segoe UI', Arial, sans-serif; fill: #e9faff; }
      .stroke-cyan { stroke: #63ecd7; }
      .stroke-amber { stroke: #f6b15c; }
    </style>
  </defs>

  <rect width="1440" height="760" rx="52" fill="url(#bg)"/>
  <rect width="1440" height="760" rx="52" fill="url(#grid)"/>
  <circle cx="1170" cy="150" r="260" fill="url(#glow-cyan)" filter="url(#blur-xl)"/>
  <circle cx="1330" cy="585" r="220" fill="url(#glow-amber)" filter="url(#blur-xl)"/>
  <circle cx="140" cy="600" r="180" fill="url(#glow-cyan)" filter="url(#blur-xl)" opacity="0.65"/>

  <g opacity="0.24">
    <path d="M834 126 C988 64, 1164 72, 1310 146" fill="none" stroke="#8ee6d7" stroke-width="2"/>
    <path d="M826 212 C1015 166, 1198 194, 1336 284" fill="none" stroke="#f4bc72" stroke-width="2"/>
    <path d="M862 574 C1038 626, 1186 628, 1322 548" fill="none" stroke="#8edfff" stroke-width="2"/>
  </g>

  <g transform="translate(86 92)">
    <rect x="0" y="0" width="472" height="54" rx="27" fill="#0f2a36" stroke="#60e8d5" stroke-opacity="0.48"/>
    <text class="kicker" x="26" y="34">compile-time MSSQL service library for Rust</text>

    <text class="title" x="0" y="174">Statiq</text>

    <rect x="0" y="224" width="198" height="54" rx="27" fill="#effaf7"/>
    <text class="mini" x="26" y="257">Zero-overhead</text>

    <rect x="214" y="224" width="154" height="54" rx="27" fill="#11283b" stroke="#9fe5ff" stroke-opacity="0.45"/>
    <text class="chip" x="241" y="257">async-first</text>

    <rect x="384" y="224" width="180" height="54" rx="27" fill="#11283b" stroke="#63ecd7" stroke-opacity="0.45"/>
    <text class="chip" x="412" y="257">static dispatch</text>

    <text class="label" x="0" y="352">CancellationToken on every operation</text>
    <text class="muted" x="0" y="392">Axum REST APIs, Leptos SSR applications, and Tauri desktop apps</text>

    <g transform="translate(0 462)">
      <rect x="0" y="0" width="168" height="56" rx="28" fill="#12293c" stroke="#8bdfff" stroke-opacity="0.46"/>
      <text class="chip-soft" x="28" y="35">Axum REST APIs</text>

      <rect x="184" y="0" width="216" height="56" rx="28" fill="#12293c" stroke="#63ecd7" stroke-opacity="0.46"/>
      <text class="chip-soft" x="214" y="35">Leptos SSR applications</text>

      <rect x="416" y="0" width="170" height="56" rx="28" fill="#12293c" stroke="#f4bc72" stroke-opacity="0.46"/>
      <text class="chip-soft" x="458" y="35">Tauri desktop apps</text>
    </g>

    <g transform="translate(0 552)">
      <rect x="0" y="0" width="596" height="118" rx="30" fill="url(#card)" stroke="#dff8ff" stroke-opacity="0.12" filter="url(#shadow)"/>
      <text class="card-title" x="34" y="48">All SQL</text>
      <text class="card-copy" x="34" y="82">SELECT  INSERT  UPDATE  DELETE  MERGE</text>
      <text class="card-copy" x="34" y="108">generated at compile time by #[derive(SqlEntity)]</text>
    </g>
  </g>

  <g transform="translate(822 92)" filter="url(#shadow)">
    <rect x="0" y="0" width="532" height="578" rx="36" fill="url(#card)" stroke="#ddf7ff" stroke-opacity="0.14"/>
    <rect x="28" y="26" width="476" height="146" rx="28" fill="url(#card-soft)" stroke="#9fe5ff" stroke-opacity="0.34"/>
    <rect x="52" y="48" width="182" height="36" rx="18" fill="#effaf7"/>
    <text class="mini" x="76" y="72">#[derive(SqlEntity)]</text>
    <text class="code" x="52" y="114">SELECT</text>
    <text class="code" x="186" y="114">INSERT</text>
    <text class="code" x="318" y="114">UPDATE</text>
    <text class="code" x="52" y="150">DELETE</text>
    <text class="code" x="186" y="150">MERGE</text>

    <path d="M266 172 L266 226" fill="none" stroke="#63ecd7" stroke-width="3" stroke-linecap="round"/>
    <circle cx="266" cy="226" r="8" fill="#63ecd7"/>

    <rect x="88" y="236" width="356" height="124" rx="30" fill="#0f2535" stroke="#63ecd7" stroke-opacity="0.36"/>
    <text class="card-title" x="122" y="284">SqlService</text>
    <text class="card-copy" x="122" y="316">SprocService</text>
    <text class="card-copy" x="122" y="344">Transaction</text>
    <text class="card-copy" x="268" y="344">RedisCache</text>

    <path d="M266 360 L266 428" fill="none" stroke="#9fe5ff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="266" cy="428" r="8" fill="#9fe5ff"/>

    <rect x="46" y="450" width="136" height="76" rx="26" fill="#effaf7"/>
    <text class="mini" x="78" y="496">Axum</text>

    <rect x="198" y="450" width="136" height="76" rx="26" fill="#0f2535" stroke="#63ecd7" stroke-opacity="0.44"/>
    <text class="mini-light" x="221" y="496">Leptos SSR</text>

    <rect x="350" y="450" width="136" height="76" rx="26" fill="#0f2535" stroke="#f4bc72" stroke-opacity="0.44"/>
    <text class="mini-light" x="393" y="496">Tauri</text>

    <rect x="378" y="194" width="102" height="72" rx="24" fill="#0f2535" stroke="#9fe5ff" stroke-opacity="0.38"/>
    <text class="mini-light" x="396" y="237">MSSQL</text>

    <rect x="30" y="194" width="122" height="72" rx="24" fill="#0f2535" stroke="#f4bc72" stroke-opacity="0.38"/>
    <text class="mini-light" x="48" y="237">config.json</text>

    <rect x="24" y="548" width="160" height="18" rx="9" fill="#63ecd7" opacity="0.75"/>
    <rect x="198" y="548" width="108" height="18" rx="9" fill="#9fe5ff" opacity="0.75"/>
    <rect x="320" y="548" width="184" height="18" rx="9" fill="#f4bc72" opacity="0.75"/>
  </g>
</svg>
