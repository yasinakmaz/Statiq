<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">Statiq sections overview</title>
  <desc id="desc">A visual overview of the major README sections in Statiq.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09131d"/>
      <stop offset="100%" stop-color="#17384d"/>
    </linearGradient>
    <linearGradient id="card-a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#effaf7"/>
      <stop offset="100%" stop-color="#d9f4ff"/>
    </linearGradient>
    <linearGradient id="card-b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#112637" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#173146" stop-opacity="0.93"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#021019" flood-opacity="0.34"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#d8f5ff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <style>
      .headline { font: 700 34px 'Space Grotesk', 'Segoe UI', Arial, sans-serif; fill: #f4fbff; }
      .card-light { font: 700 20px 'Space Grotesk', 'Segoe UI', Arial, sans-serif; fill: #08131d; }
      .card-dark { font: 700 20px 'Space Grotesk', 'Segoe UI', Arial, sans-serif; fill: #effaff; }
      .caption { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #b7d6ea; }
      .index { font: 700 14px 'Cascadia Code', 'Consolas', monospace; fill: #52758e; }
      .index-light { font: 700 14px 'Cascadia Code', 'Consolas', monospace; fill: #d0eefe; }
    </style>
  </defs>

  <rect width="1440" height="760" rx="42" fill="url(#bg)"/>
  <rect width="1440" height="760" rx="42" fill="url(#grid)"/>

  <text class="headline" x="72" y="92">Table of Contents</text>
  <text class="caption" x="72" y="126">Crates, Requirements, Cargo.toml Setup, config.json, Defining an Entity, Building a Service</text>

  <g filter="url(#shadow)">
    <rect x="72" y="168" width="248" height="92" rx="24" fill="url(#card-a)"/>
    <text class="index" x="104" y="206">01</text>
    <text class="card-light" x="104" y="230">Crates</text>

    <rect x="344" y="168" width="248" height="92" rx="24" fill="url(#card-b)"/>
    <text class="index-light" x="376" y="206">02</text>
    <text class="card-dark" x="376" y="230">Requirements</text>

    <rect x="616" y="168" width="248" height="92" rx="24" fill="url(#card-a)"/>
    <text class="index" x="648" y="206">03</text>
    <text class="card-light" x="648" y="230">Cargo.toml Setup</text>

    <rect x="888" y="168" width="248" height="92" rx="24" fill="url(#card-b)"/>
    <text class="index-light" x="920" y="206">04</text>
    <text class="card-dark" x="920" y="230">config.json</text>

    <rect x="1160" y="168" width="208" height="92" rx="24" fill="url(#card-a)"/>
    <text class="index" x="1192" y="206">05</text>
    <text class="card-light" x="1192" y="230">Defining an Entity</text>

    <rect x="72" y="286" width="248" height="92" rx="24" fill="url(#card-b)"/>
    <text class="index-light" x="104" y="324">06</text>
    <text class="card-dark" x="104" y="348">Building a Service</text>

    <rect x="344" y="286" width="248" height="92" rx="24" fill="url(#card-a)"/>
    <text class="index" x="376" y="324">07</text>
    <text class="card-light" x="376" y="348">CRUD Operations</text>

    <rect x="616" y="286" width="248" height="92" rx="24" fill="url(#card-b)"/>
    <text class="index-light" x="648" y="324">08</text>
    <text class="card-dark" x="648" y="348">params! Macro</text>

    <rect x="888" y="286" width="248" height="92" rx="24" fill="url(#card-a)"/>
    <text class="index" x="920" y="324">09</text>
    <text class="card-light" x="920" y="348">Transactions</text>

    <rect x="1160" y="286" width="208" height="92" rx="24" fill="url(#card-b)"/>
    <text class="index-light" x="1192" y="324">10</text>
    <text class="card-dark" x="1192" y="348">Stored Procedures</text>

    <rect x="72" y="404" width="248" height="92" rx="24" fill="url(#card-a)"/>
    <text class="index" x="104" y="442">11</text>
    <text class="card-light" x="104" y="466">Multiple Result Sets</text>

    <rect x="344" y="404" width="248" height="92" rx="24" fill="url(#card-b)"/>
    <text class="index-light" x="376" y="442">12</text>
    <text class="card-dark" x="376" y="466">Redis Cache</text>

    <rect x="616" y="404" width="248" height="92" rx="24" fill="url(#card-a)"/>
    <text class="index" x="648" y="442">13</text>
    <text class="card-light" x="648" y="466">Raw Queries</text>

    <rect x="888" y="404" width="248" height="92" rx="24" fill="url(#card-b)"/>
    <text class="index-light" x="920" y="442">14</text>
    <text class="card-dark" x="920" y="466">Error Handling</text>

    <rect x="1160" y="404" width="208" height="92" rx="24" fill="url(#card-a)"/>
    <text class="index" x="1192" y="442">15</text>
    <text class="card-light" x="1192" y="466">MockRepository</text>

    <rect x="72" y="522" width="316" height="92" rx="24" fill="url(#card-b)"/>
    <text class="index-light" x="104" y="560">16</text>
    <text class="card-dark" x="104" y="584">Axum Integration</text>

    <rect x="412" y="522" width="316" height="92" rx="24" fill="url(#card-a)"/>
    <text class="index" x="444" y="560">17</text>
    <text class="card-light" x="444" y="584">Leptos SSR Integration</text>

    <rect x="752" y="522" width="196" height="92" rx="24" fill="url(#card-b)"/>
    <text class="index-light" x="784" y="560">18</text>
    <text class="card-dark" x="784" y="584">Type Mappings</text>

    <rect x="972" y="522" width="196" height="92" rx="24" fill="url(#card-a)"/>
    <text class="index" x="1004" y="560">19</text>
    <text class="card-light" x="1004" y="584">Attribute Reference</text>

    <rect x="1192" y="522" width="176" height="92" rx="24" fill="url(#card-b)"/>
    <text class="index-light" x="1224" y="560">20</text>
    <text class="card-dark" x="1224" y="584">Field Reference</text>
  </g>
</svg>
